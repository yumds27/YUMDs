name = "yarmoukmds-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Isolated, separate-business account — never reuse JUMED's IDs (lesson #4).
account_id = "94a4b70ec03e21db48fe1502e83277bd"

workers_dev = true
preview_urls = true

# Custom domain for the API — WAF already checked clean (lesson #9 ✓).
routes = [
  { pattern = "api.yarmoukmds.com", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "yarmoukmds-db"
database_id = "2e56606d-5fbd-489c-bf0d-46155468cfe9"

[[r2_buckets]]
binding = "FILES"
bucket_name = "yarmoukmds-files"

[[kv_namespaces]]
binding = "CONFIG"
id = "a8adbf6f9b3345e78a998bf881c8ee6a"

# ── Vars ──────────────────────────────────────────────────────
[vars]
# Lesson #8: explicitly lists both apex and subdomains so CORS never breaks
# on just one. Comma-separated; localhost included for local wrangler dev.
ALLOWED_ORIGIN = "https://yarmoukmds.com,https://www.yarmoukmds.com,http://localhost:5173"
STRIPE_PRICE_ID = "price_1TnoBUDqJlHFbC2TBqoB5Uvz"
